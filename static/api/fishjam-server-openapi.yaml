security: []
servers:
  - url: https://fishjam.io/api/v1/connect/{fishjamId}
    variables:
      fishjamId:
        default: ""
        description: Fishjam ID
tags:
  - description: |
      WebRTC rooms for videoconferencing. Each room hosts one or
      more **peers** that exchange media through Fishjam.

      These endpoints cover the room lifecycle and per-room peer management —
      adding and removing peers, refreshing peer tokens, and configuring
      subscription policies between peers. For one-to-many scenarios,
      see **Streams**.
    name: Rooms
  - description: |
      WebRTC livestreams for broadcasting scenarios.
      A stream holds the configuration for a one-to-many session and owns the
      **streamers** that publish to it and the **Viewers** that consume it.
    name: Streams
  - description: |
      A **streamer** represents a single publisher session for a stream and
      carries an ephemeral token that Fishjam verifies before accepting
      media. Use these endpoints to provision a streamer, revoke one, or issue a
      fresh streamer token scoped to a livestream.
    name: Streamers
  - description: |
      A **viewer** represents a single consumer session for a stream, identified
      by an ephemeral token that Fishjam verifies on subscribe. These
      endpoints provision and revoke viewers and issue viewer tokens for a
      livestream room.

      The endpoints in this section are only applicable to private livestreams.
      Public livestreams can be viewed anonymously, without creating a viewer resource.
    name: Viewers
  - description: |
      Forward media tracks from a room's peers into a **composition**.
      Useful for compositing room media into a single output for recording, transcoding,
      or downstream broadcast.

      Only the `"all"` selector is currently supported, which forwards every
      active track in the room.
    name: Track Forwardings
  - description: |
      A **recording** is a saved capture of media output. Creating one synchronously starts
      capturing, so it is born `active`; follow its `status` as media is finalized
      (`active` → `available`, or `failed`). A recording stands on its own, independent of the
      room, stream, or composition it came from, so it stays available after that source ends.

      Set free-form `metadata` when you create a recording; you can then use it to filter
      recordings when fetching them.
    name: Recordings
  - description: |
      Issue short-lived JWT tokens that authorize **Media over QUIC** relay
      clients to publish and/or subscribe under a scoped path.

      A token grants access to its `publishPath` and/or `subscribePath` for one
      hour; clients must request a fresh token after that window.
    name: MoQ
